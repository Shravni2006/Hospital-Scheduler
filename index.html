<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Smart Appointment Scheduler</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <style>
    body {
      background: linear-gradient(135deg, #e0f7fa, #e1bee7);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .form-container {
      background: white;
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
      width: 100%;
      max-width: 480px;
    }
  </style>
</head>
<body>
  <div class="form-container">
    <h3 class="text-center mb-4 text-primary">🏥 Smart Appointment Scheduler</h3>

    <form action="/book" method="POST">
      <div class="mb-3">
        <label for="name" class="form-label">Full Name</label>
        <input type="text" class="form-control" id="name" name="name" required>
      </div>

      <div class="mb-3">
        <label for="email" class="form-label">Email ID</label>
        <input type="email" class="form-control" id="email" name="email" required>
      </div>

      <div class="mb-3">
        <label for="phone" class="form-label">Phone Number</label>
        <input type="text" class="form-control" id="phone" name="phone" required>
      </div>

      <div class="mb-3">
        <label for="department" class="form-label">Department</label>
        <select class="form-select" id="department" name="department" required>
          <option value="">Select Department</option>
          <option>General</option>
          <option>Cardiology</option>
          <option>Orthopedics</option>
          <option>ENT</option>
        </select>
      </div>

      <div class="mb-3">
        <label for="date" class="form-label">Preferred Date</label>
        <input type="date" class="form-control" id="date" name="date" required>
      </div>

      <div class="mb-3">
        <label for="time" class="form-label">Preferred Time</label>
        <input type="time" class="form-control" id="time" name="time" required>
      </div>

      <button type="submit" class="btn btn-primary w-100 mt-3">Book Appointment</button>
    </form>
  </div>
 <a href="/chat" 
   style="position:fixed;bottom:30px;right:30px;
          background:#007bff;color:white;
          padding:12px 18px;border-radius:50px;
          text-decoration:none;font-weight:bold;
          box-shadow:0 4px 10px rgba(0,0,0,0.2);">
💬 Chat with Assistant
</a>


  <script>
    // 🗓 Automatically disable past dates
    const today = new Date().toISOString().split("T")[0];
    document.getElementById("date").setAttribute("min", today);
  </script>
</body>
</html>
